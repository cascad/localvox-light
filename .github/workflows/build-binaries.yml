# Сборка release-бинарников + опционально GitHub Release с вложениями.
# Триггеры: push в main (по paths), push тега v*, ручной запуск.

name: Build binaries

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "После сборки опубликовать GitHub Release с бинарниками"
        type: boolean
        default: false
      release_tag:
        description: "Имя тега, например v0.1.0 (нужно, если publish_release)"
        type: string
        required: false
        default: ""
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/build-binaries.yml"
      - "scripts/setup-vosk.sh"
      - "scripts/setup-vosk.ps1"
      - "scripts/install-release.sh"
      - "scripts/install-release.ps1"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: localvox-light-x86_64-unknown-linux-gnu
            bin: localvox-light
            vosk_preset: linux-x86_64

          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: localvox-light-aarch64-unknown-linux-gnu
            bin: localvox-light
            vosk_preset: linux-aarch64

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: localvox-light-x86_64-pc-windows-msvc
            bin: localvox-light.exe
            vosk_preset: ""

          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: localvox-light-x86_64-apple-darwin
            bin: localvox-light
            vosk_preset: darwin

          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            artifact: localvox-light-aarch64-apple-darwin
            bin: localvox-light
            vosk_preset: darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (ALSA / cpal)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Vosk native library (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/setup-vosk.sh
          ./scripts/setup-vosk.sh --skip-model --preset=${{ matrix.vosk_preset }}

      - name: Install Vosk native library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-vosk.ps1 -SkipModel

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo build
        shell: bash
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/vosk-lib
        run: cargo build --release --locked -p localvox-light --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: ${{ needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten assets (unique names for install-release.*)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            base=$(basename "$dir")
            bin=$(find "$dir" -type f \( -name '*.exe' -o -name 'localvox-light' \) | head -1)
            if [[ -z "$bin" ]]; then
              bin=$(find "$dir" -type f ! -name '.*' | head -1)
            fi
            if [[ "$bin" == *.exe ]]; then
              cp "$bin" "release-assets/${base}.exe"
            else
              cp "$bin" "release-assets/${base}"
            fi
          done
          ls -la release-assets/

      - name: Set release tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
